name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install Java and Ghidra
      run: |
        sudo apt-get update && sudo apt-get install -y default-jdk wget unzip
        GHIDRA_VERSION="11.0.3"
        GHIDRA_ZIP="ghidra_${GHIDRA_VERSION}_PUBLIC_20240410.zip"
        GHIDRA_URL="https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/${GHIDRA_ZIP}"
        GHIDRA_SHA256="2462a2d0ab11e30f9e907cd3b4aa6b48dd2642f325617e3d922c28e752be6761"
        wget "${GHIDRA_URL}" -O ghidra.zip
        echo "${GHIDRA_SHA256}  ghidra.zip" | sha256sum -c -
        unzip -q ghidra.zip -d /opt/
        echo "GHIDRA_INSTALL_DIR=/opt/ghidra_${GHIDRA_VERSION}_PUBLIC" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install ruff bandit
        
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Security scan with Bandit
      run: |
        bandit -ll -ii -c pyproject.toml -r .
        
    - name: Test with pytest
      run: |
        pytest

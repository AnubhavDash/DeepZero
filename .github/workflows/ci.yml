name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install Java and Ghidra
      run: |
        sudo apt-get update && sudo apt-get install -y default-jdk wget unzip
        wget https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.0.3_build/ghidra_11.0.3_PUBLIC_20240410.zip -O ghidra.zip
        unzip -q ghidra.zip -d /opt/
        echo "GHIDRA_INSTALL_DIR=/opt/ghidra_11.0.3_PUBLIC" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install ruff bandit
        
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Security scan with Bandit
      run: |
        bandit -ll -ii -c pyproject.toml -r .
        
    - name: Test with pytest
      run: |
        pytest

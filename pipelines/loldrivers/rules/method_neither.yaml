rules:
  - id: ghidra-method-neither-no-probe
    languages: [c]
    severity: ERROR
    message: >
      IOCTL handler accesses Irp->UserBuffer or raw user pointer
      without ProbeForRead/ProbeForWrite. This is a METHOD_NEITHER
      boundary failure ΓÇö the driver treats a user-supplied address
      as a valid kernel pointer without validation.
    metadata:
      vuln_class: "Arbitrary Kernel Memory R/W"
      cwe: "CWE-822"
      exploitability: "HIGH"
    patterns:
      - pattern: $X = *(... + 0x60);
      - pattern-not-inside: |
          ProbeForRead(...);
      - pattern-not-inside: |
          ProbeForWrite(...);

  - id: ghidra-user-buffer-direct-deref
    languages: [c]
    severity: ERROR
    message: >
      Direct dereference of user-supplied buffer pointer without
      validation. In METHOD_NEITHER IOCTLs, UserBuffer is a raw
      user-mode address that can point anywhere.
    metadata:
      vuln_class: "Arbitrary Kernel Memory R/W"
      cwe: "CWE-822"
    pattern: |
      $BUF = *(... + 0x60);
      ...
      *$BUF = ...;

  - id: ghidra-irp-systembuffer-no-length-check
    languages: [c]
    severity: WARNING
    message: >
      IOCTL uses SystemBuffer without checking InputBufferLength
      or OutputBufferLength. May allow out-of-bounds access.
    metadata:
      vuln_class: "Arbitrary Kernel Memory R/W"
      cwe: "CWE-120"
    patterns:
      - pattern: $BUF = *(... + 0x18);
      - pattern-not-inside: |
          if (... < ...) { ... }
